# /* ---- 💫 https://github.com/JaKooLit 💫 ---- */  #
# User Settings
# This is where you put your own settings as this will not be touched during update

# refer to Hyprland wiki for more info https://wiki.hyprland.org/Configuring/Variables

# Sourcing colors generated by pywal
source = $HOME/.config/hypr/wallust/wallust-hyprland.conf
# blurls = waybar
# blurls = rofi

dwindle {
  #pseudotile = yes
  preserve_split = yes
  special_scale_factor = 0.8
  split_width_multiplier = 1.5
  #default_split_ratio = 1.0
}

general {
  #sensitivity=1.00
  #apply_sens_to_raw=1
  gaps_in = 4
  gaps_out = 8
  border_size = 2
  resize_on_border = true
  col.active_border = $color0 $color2 $color4 $color6 $color8 90deg
  col.inactive_border = $background

  # layout = dwindle  # Default layout
  #layout = master  # Alternative layout
  layout = hy3  # Requires plugin installation
  # Ajouts recommandés pour les jeux
  no_focus_fallback = false
  extend_border_grab_area = true
  hover_icon_on_border = false
}

plugin {
    hy3 {
        tabs{
          # Ta config actuelle
          height = 21
          radius = 8
          text_height = 10
          padding = 3
          render_text = true
          text_center = true  # ← AJOUTE ÇA pour centrer le titre

          # Couleurs actives
          col.active.border = $color8
          col.active = $color13
          col.active.text = $foreground  # ← AJOUTE pour le texte

          # Couleurs inactives
          col.inactive.border = $background
          col.inactive = $background
          col.inactive.text = $color7  # ← AJOUTE (texte plus discret)

          # Couleurs focused (fenêtre dans groupe non-actif)
          col.focused.border = $color14
          col.focused = $color13
          col.focused.text = $foreground  # ← AJOUTE

          # BONUS : Couleurs urgentes (optionnel)
          col.urgent = $color1  # Rouge
          col.urgent.border = $color9
          col.urgent.text = $foreground
        }

      autotile{
        enable = true
        ephemeral_groups = true
        trigger_width = 1140
        trigger_height = 0
      }
  }
    dynamic-cursors {
      enabled = true

      mode = none

      threshold = 1
    }

    overview {
      enabled = true

      disableBlur = true
      panelColor = $color4
      panelBorderColor = $color12
      dragAlpha = 0.8
      panelHeight = 200
      workspaceMargin = 6
   }
}


master {
  # Configuration for 3 equal columns on ultra-wide display
  new_status = master  # First window is master
  new_on_top = false  # New windows go to the right
  mfact = 0.33  # Master takes 1/3 of screen (3440 / 3)
  orientation = left  # Master on left, slaves stack to right
  #inherit_fullscreen = true

}

group {
  col.border_active = $color15

	groupbar {
	col.active = $color0
  }
}


input {
  kb_layout=fr
  kb_variant=azerty
  kb_model=generic_104
  kb_options=grp:alt_shift_toggle
  kb_rules=
  repeat_rate=50
  repeat_delay=300
  numlock_by_default=1
  left_handed=0
  follow_mouse = 1
  mouse_refocus = false
  force_no_accel = true
  float_switch_override_focus=2
  scroll_factor = 1
  #accel_profile = flat  # Pour une accélération souris linéaire
  natural_scroll = false
}

#gestures {
# workspace_swipe=1
# workspace_swipe_fingers=3
# workspace_swipe_distance=400
#workspace_swipe_invert=1
#  workspace_swipe_min_speed_to_force=15
#  workspace_swipe_cancel_ratio=0.5
#"" workspace_swipe_create_new=1
#workspace_swipe_forever=1
#}

cursor {
  no_hardware_cursors = true
  enable_hyprcursor = true
  warp_on_change_workspace = false
  no_warps = true
  hide_on_key_press = false
  hide_on_touch = false
}

misc {
  disable_hyprland_logo = true
  disable_splash_rendering = true
  always_follow_on_dnd = true
  mouse_move_enables_dpms = false
  key_press_enables_dpms = false
  layers_hog_keyboard_focus = false
  vrr = 3
  #vfr = false
  enable_swallow = true
  animate_manual_resizes = false
  animate_mouse_windowdragging = false
  swallow_regex = ^(kitty)$
  disable_autoreload = false
  focus_on_activate = true
  close_special_on_empty = true
  allow_session_lock_restore = true
  initial_workspace_tracking = 0
}

binds {
  workspace_back_and_forth=true
  allow_workspace_cycles=true:
  pass_mouse_when_bound=true
}

#Could help when scaling and not pixelating
xwayland {
  enabled = true
  force_zero_scaling = true
  use_nearest_neighbor = true
}

# render section for Hyprland >= v0.42.0
render {
  #explicit_sync = 2
  #explicit_sync_kms = 2
  direct_scanout = false
}
