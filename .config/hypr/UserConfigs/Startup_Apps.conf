#Commands & Apps to be executed at launch
# /* ---- 💫 https://github.com/JaKooLit 💫 ---- */  #

$scriptsDir = $HOME/.config/hypr/scripts
$UserScripts = $HOME/.config/hypr/UserScripts
$Openrgb = $HOME/.config/quickshell/rgb-launcher/modules/script

$wallDIR=$HOME/Pictures/wallpapers
$lock = $scriptsDir/LockScreen.sh
$SwwwRandom = $UserScripts/WallpaperRandom.sh

# Cursor
#exec-once = hyprctl setcursor Adwaita 24
#exec-once = hyprctl setcursor Bibata-Modern-Ice 24
exec-once = openrgb --server --startminimized &

env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24

# wallpaper stuff / More wallpaper options below
exec-once = awww query || awww-daemon
exec-once = $SwwwRandom $wallDIR # random wallpaper switcher every 30 minutes

# Startup
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP

# Polkit (Polkit Gnome / KDE)
exec-once = $scriptsDir/Polkit.sh

# starup apps
exec-once = quickshell -p /home/florian/.config/quickshell/Quick-Bar/shell.qml &
# exec-once = waybar &
exec-once = nm-applet --indicator &
exec-once = swaync &
exec-once = ags &
#
#exec-once = blueman-applet &
#exec-once = rog-control-center &

#clipboard manager
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store

# Rainbow borders
exec-once = $UserScripts/RainbowBorders.sh &

# Starting hypridle to start hyprlock
exec-once = hypridle &

# Start pyprland daemon
exec-once = pypr &

# Start eww
exec-once = eww daemon &

#Script Setting monitor
#exec-once = $UserScripts/Monitor/window_manager.sh &


# xdg-desktop-portal-hyprland (should be auto starting. However, you can force to start)
#exec-once = $scriptsDir/PortalHyprland.sh

exec-once = spicetify apply &

# Start Plugin Hy3
exec-once = hyprpm reload -n &

# Start Effet
exec-once = easyeffects &

exec-once = vader5d -c ~/.config/vader5/config.toml &


exec-once = sleep 12 && python ~/.config/quickshell/rgb-launcher/modules/script/OpenRGB_Controller_Watch.py


