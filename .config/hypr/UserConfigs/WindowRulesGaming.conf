# /* ---- 🎮 Configuration Hyprland 0.53 - Règles Gaming 🎮 ---- */
# Documentation: https://wiki.hypr.land/Configuring/Window-Rules/

# ╔══════════════════════════════════════════════════════════════════════════╗
# ║                         DÉFINITION DES TAGS GAMING                       ║
# ╚══════════════════════════════════════════════════════════════════════════╝

# Game tags - Applications de jeux en cours
windowrule = match:class ^(gamescope)$, tag +games
windowrule = match:class ^(steam_app_\\d+)$, tag +games
windowrule = match:class ^(.*.exe*)$, tag +games

# Gamestore tags - Launchers et boutiques
windowrule = match:class ^([Ss]team)$, tag +gamestore
windowrule = match:title ^([Ll]utris)$, tag +gamestore
windowrule = match:class ^(com.heroicgameslauncher.hgl)$, tag +gamestore


# ╔══════════════════════════════════════════════════════════════════════════╗
# ║                            STEAM CONFIGURATION                           ║
# ╚══════════════════════════════════════════════════════════════════════════╝

# ===== Steam Main Window =====
# Fenêtre principale de Steam en mode tiled sur workspace 9
windowrule {
    name = steam-main
    match:class = ^([Ss]team)$
    workspace = 9 silent
}

# ===== Steam Float Dialogs =====
# Dialogues et popups Steam (Library, Parameters, About, etc.)
#windowrule {
    #name = steam-dialogs
    #match:tag = gamestore
    #match:title = negative:^([Ss]team)$
    #float = on
    #center = on
#}

# Fenêtres spécifiques Steam (Liste amis, Paramètres, etc.)
windowrule {
    name = steam-float-windows
    match:class = ^([Ss]team)$
    match:title = ^(L.*|Para.*|A.*)
    float = on
    center = on
    size = 60% 40%
}

# ===== Steam Games =====
# Configuration pour les jeux Steam (steam_app_*)
windowrule {
    name = steam-games
    match:class = ^(steam_proton|steam_app_|.*.exe*).*
    workspace = 1
    content = game
    center = on
    immediate = on
    no_blur = on
    idle_inhibit = focus
}

# Configuration pour les jeux Steam (Gamescope)
windowrule {
    name = gamescope
    match:class = ^(gamescope)$
    workspace = 1
    content = game
    center = on
    immediate = on
    no_blur = on
    idle_inhibit = focus
}


# ╔══════════════════════════════════════════════════════════════════════════╗
# ║                         LAUNCHERS CONFIGURATION                          ║
# ╚══════════════════════════════════════════════════════════════════════════╝

# ===== Heroic Games Launcher =====
windowrule {
    name = heroic-launcher
    match:class = ^(com.heroicgameslauncher.hgl)$
    workspace = 9 silent
    tile = on
}

# ===== Lutris =====
windowrule {
    name = lutris-launcher
    match:title = ^([Ll]utris)$
    workspace = 9 silent
    tile = on
}


# ╔══════════════════════════════════════════════════════════════════════════╗
# ║                         JEUX SPÉCIFIQUES                                 ║
# ╚══════════════════════════════════════════════════════════════════════════╝

# ===== Magic: The Gathering Arena =====
# Configuration pour MTGA via Steam
windowrule {
    name = mtga-steam
    match:title = ^(MTGA).*
    workspace = 1
    content = game
    center = on
    maximize = on
    no_blur = on
    idle_inhibit = focus
    immediate = on
}

# ===== Dofus =====
# Configuration pour Dofus avec résolution et position spécifiques pour ultrawide 3440x1440
windowrule {
    name = dofus
    match:class = ^(Dofus.x64)$
    workspace = 1
    float = on
    immediate = on
    center = off
    size = 3438 1390
    move = 1 43
    no_blur = on
    idle_inhibit = focus
}

# ===== Gamescope =====
# Configuration pour les jeux lancés via Gamescope
windowrule {
    name = gamescope-games
    match:class = ^(gamescope)$
    workspace = 1
    content = game
    center = on
    no_blur = on
    idle_inhibit = focus
    immediate = on
}

# ===== Jeux via Wine/Proton (fichiers .exe) =====
# Configuration pour les exécutables Windows
windowrule {
    name = wine-games
    match:title = .*\.exe
    workspace = 8
    content = game
    center = on
    no_blur = on
    idle_inhibit = focus
    immediate = on
}


# ╔══════════════════════════════════════════════════════════════════════════╗
# ║                       RÈGLES GÉNÉRALES GAMING                            ║
# ╚══════════════════════════════════════════════════════════════════════════╝

# Opacity pour les launchers
windowrule = match:tag gamestore, opacity 0.95 0.9


# ╔══════════════════════════════════════════════════════════════════════════╗
# ║                               NOTES                                      ║
# ╚══════════════════════════════════════════════════════════════════════════╝

# Configuration optimisée pour:
# - Steam et jeux Steam (workspace 8 pour les jeux, 9 pour Steam)
# - Heroic Games Launcher (workspace 9)
# - Lutris (workspace 9)
# - MTGA (Magic: The Gathering Arena) - workspace 8
# - Dofus (avec résolution personnalisée pour ultrawide 3440x1440) - workspace 8
# - Gamescope (composition pour gaming) - workspace 8
# - Jeux Wine/Proton (.exe) - workspace 8
#
# Fonctionnalités activées pour les jeux:
# - workspace = 8: tous les jeux sur le workspace 8
# - idle_inhibit = focus: empêche la mise en veille pendant le jeu
# - no_blur = on: désactive le blur pour de meilleures performances
# - immediate = on: rend la fenêtre immédiatement
# - content = game: optimise le pipeline de rendu pour le gaming
# - center = on: centre les fenêtres de jeux
#
# Workspace organization:
# - Workspace 8: Tous les JEUX actifs
# - Workspace 9: Tous les LAUNCHERS (Steam, Heroic, Lutris)
