# wallust 3.0 beta.*

backend = "kmeans"
#color_space = "labmixed"
color_space = "lchmixed"

# NOTE: All filters will fill 16 colors (from color0 to color15), 16 color
#       variations are the 'ilusion' of more colors by opaquing color1 to color5.
# Use the most prominent colors in a way that makes sense, a scheme:
#  * dark        - 8 dark colors, dark background and light contrast
#  * dark16      - Same as `dark` but uses the 16 colors trick
#  * harddark    - Same as `dark` with hard hue colors
#  * harddark16  - Harddark with 16 color variation
#  * light       - Light bg, dark fg
#  * light16     - Same as `light` but uses the 16 color trick
#  * softdark    - Variant of softlight, uses the lightest colors and a dark
#                   background (could be interpreted as `dark` inversed)
#  * softdark16  - softdark with 16 color variation
#  * softlight   - Light with soft pastel colors, counterpart of `harddark`
#  * softlight16 - softlight with 16 color variation
palette = "dark16"

# Difference between similar colors, used by the colorspace:
#  1          Not perceptible by human eyes.
#  1 - 2      Perceptible through close observation.
#  2 - 10     Perceptible at a glance.
#  11 - 49    Colors are more similar than opposite
#  100        Colors are exact opposite
threshold = 10

[templates]
cava.template = 'templates/colors-cava'
cava.target = '~/.config/cava/config'

hypr.template = 'templates/colors-hyprland.conf'
hypr.target = '~/.config/hypr/wallust/wallust-hyprland.conf'

steam.template = "templates/steam-millennium.css"
steam.target   = "~/.config/millennium/quickcss.css"

starship.template = 'templates/starship.toml'
starship.target = '~/.config/starship.toml'

hypr_lua.template = "templates/hyprland-colors.lua"
hypr_lua.target   = "~/.config/hypr/wallust/colors.lua"

ranger.template = 'templates/colors-ranger.py'
ranger.target = '~/.config/ranger/colorschemes/rangercolors.py'

rofi.template = 'templates/colors-rofi.rasi'
rofi.target = '~/.config/rofi/wallust/colors-rofi.rasi'

spotify.template = 'templates/color-spot.ini'
spotify.target = '~/.config/spicetify/Themes/Pywall/color.ini'

rofigame.template = 'templates/colors.rasi'
rofigame.target = '~/.config/rofi/themes/colors.rasi'

waybar.template = 'templates/colors-waybar.css'
waybar.target = '~/.config/waybar/wallust/colors-waybar.css'

kitty.template = 'templates/colors-kitty.conf'
kitty.target = '~/.config/kitty/kitty.conf'

claude.template = 'templates/claude.json'
claude.target = '~/.cache/wal/wal.json'

quickshell.template = 'qml_color.json'
quickshell.target = '~/.config/quickshell/qml_color.json'

wezterm.template = 'templates/colors.lua'
wezterm.target = '~/.config/wezterm/colors/walcolors.lua'

nvim.template = 'templates/colors-wal.vim'
nvim.target = '~/.cache/wal/colors-wal.vim'

dash.template = 'templates/dashboard.lua'
dash.target = '~/.config/nvim/lua/plugins/dashboard.lua'

eww.template = 'templates/colors-eww.scss'
eww.target = '~/.config/eww/dashboard/wallust-colors.scss'

#zathura.template = 'templates/colors-zathura'
#zathura.target = '~/.config/zathura/zathurarc'

gtk.template = 'templates/pywal/_colors.scss'
gtk.target = '~/.themes/gtk/scss/gtk-3.0/_colors.scss'

discord.template = 'templates/pywal-discord-abou.css'
discord.target = '~/.config/BetterDiscord/themes/pywal-discord-abou.theme.css'

kv.template = 'templates/pywal.kvconfig'
kv.target = '~/.config/hypr/Kvantum/pywal/pywal.kvconfig'

kvsvg.template = 'templates/pywal.svg'
kvsvg.target = '~/.config/hypr/Kvantum/pywal/pywal.svg'

openrgb.template = 'templates/claude.json'
openrgb.target = '~/.config/quickshell/rgb-launcher/modules/script/wal_rgb.json'

# colors.json standard pywal — requis par dlasagno.wal-theme (Windsurf)
wal_colors.template = 'templates/claude.json'
wal_colors.target = '~/.cache/wal/colors.json'

[misc]
exec = ["python3 /home/florian/.config/wallust/hooks/windsurf-theme.py"]


